# Keyboard layouts
keyboard --vckeymap=gb --xlayouts='gb'
# System language
lang en_GB.UTF-8

# Force the installer to reboot automatically without prompting 
reboot --eject

# Configure and activate the first network interface (Primary)
network --bootproto=dhcp --device=enp0s3 --activate --onboot=yes 

# Configure and activate the second network interface (Secondary)
network --bootproto=dhcp --device=enp0s8 --activate --onboot=yes --hostname=rhel10


